name: Build Windows EXE

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # 1. Récupération du code source
      - name: Checkout du code
        uses: actions/checkout@v4

      # 2. Configuration du JDK Java 21 (Ajusté sur Java 21)
      - name: Configuration de Java JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Configurer WiX Toolset (requis par jpackage --type exe)
        shell: pwsh
        run: |
          $wixPath = "${env:ProgramFiles(x86)}\WiX Toolset v3.14\bin"
          
          if (-not (Test-Path $wixPath)) {
            choco install wixtoolset --version=3.14.1 -y --no-progress --allow-downgrade --force
          }
          
          if (Test-Path $wixPath) {
            echo $wixPath | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          } else {
            Write-Error "WiX Toolset introuvable dans $wixPath"
          }

      - name: Compiler et copier les dépendances
        run: mvn -B clean package -DskipTests

      - name: Nettoyer les JARs JavaFX non spécifiques à Windows
        shell: pwsh
        run: |
          $depsDir = "target/dependency"
          if (Test-Path $depsDir) {
            Get-ChildItem $depsDir -Filter "javafx-*.jar" |
              Where-Object { $_.Name -notmatch "-win\.jar$" } |
              ForEach-Object {
                Write-Host "Suppression du JAR neutre : $($_.Name)"
                Remove-Item $_.FullName -Force
              }
          }

      - name: Créer le dossier de destination
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path dist

      - name: Construire l'installeur Windows (.exe) avec jpackage
        shell: pwsh
        run: |
          jpackage `
            --type exe `
            --name Bypedu `
            --dest dist `
            --module-path "target/bypedu-1.0-SNAPSHOT.jar;target/dependency" `
            --module tg.univlome.epl.bypedu/tg.univlome.epl.bypedu.App `
            --add-modules ALL-MODULE-PATH `
            --java-options "-Dfile.encoding=UTF-8" `
            --win-shortcut `
            --win-menu `
            --win-dir-chooser `
            --dest dist/

      # 6. Sauvegarde du fichier .exe dans les artefacts GitHub
      - name: Importer l'installateur généré dans les artefacts
        uses: actions/upload-artifact@v4
        with:
          name: BypEdu-Installer-Windows
          path: dist/*.exe
