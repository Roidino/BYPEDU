name: Build Windows EXE
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
jobs:
  windows-exe:
    runs-on: windows-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer le JDK 21 (fournit jpackage)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Installer WiX Toolset 3 (requis par jpackage --type exe)
        shell: pwsh
        run: |
          choco install wixtoolset --version=3.14.1 -y
          echo "C:\Program Files (x86)\WiX Toolset v3.14\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Compiler et récupérer les dépendances
        run: mvn -B clean package -DskipTests

      - name: Supprimer les jars JavaFX non classifiés (placeholders vides)
        shell: pwsh
        run: |
          Get-ChildItem target/libs -Filter "javafx-*.jar" |
            Where-Object { $_.Name -notmatch "-win\.jar$" } |
            ForEach-Object {
              Write-Host "Suppression: $($_.Name)"
              Remove-Item $_.FullName -Force
            }

      - name: Construire l'installeur Windows (.exe) avec jpackage
        shell: pwsh
        run: |
          jpackage `
            --type exe `
            --name Bypedu `
            --dest dist `
            --module-path "target/bypedu-1.0-SNAPSHOT.jar;target/libs" `
            --module tg.univlome.epl.bypedu/tg.univlome.epl.bypedu.App `
            --add-modules ALL-MODULE-PATH `
            --java-options "-Dfile.encoding=UTF-8" `
            --win-shortcut `
            --win-menu `
            --win-dir-chooser `
            --win-per-user-install `
            --win-upgrade-uuid 8f14e45f-ceea-467e-9573-e8e3d9c6f9a3

      - name: Publier l'installeur en tant qu'artefact
        uses: actions/upload-artifact@v4
        with:
          name: Bypedu-Windows-Installer
          path: dist/*.exe