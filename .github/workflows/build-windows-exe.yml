name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  windows-exe:
    runs-on: windows-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer le JDK 21 (fournit jpackage)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Compiler et récupérer les dépendances
        run: mvn -B clean package -DskipTests

      - name: Construire l'exécutable Windows avec jpackage
        shell: pwsh
        run: |
          jpackage `
            --type app-image `
            --name Bypedu `
            --dest dist `
            --module-path "target/bypedu-1.0-SNAPSHOT.jar;target/libs" `
            --module tg.univlome.epl.bypedu/tg.univlome.epl.bypedu.App `
            --add-modules ALL-MODULE-PATH `
            --java-options "-Dfile.encoding=UTF-8"

      - name: Publier l'exécutable en tant qu'artefact
        uses: actions/upload-artifact@v4
        with:
          name: Bypedu-Windows
          path: dist/Bypedu
