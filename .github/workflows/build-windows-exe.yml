name: Build Windows Executable (.exe)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # Permet de lancer le build manuellement depuis l'interface GitHub

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      # 1. Récupération du code source
      - name: Checkout du code
        uses: actions/checkout@v4

      # 2. Configuration du JDK Java
      - name: Configuration de Java JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # 3. Compilation et empaquetage du projet avec Maven
      - name: Build du projet avec Maven
        run: mvn clean package -DskipTests

      # 4. Création du dossier de sortie
      - name: Préparation du répertoire dist
        run: mkdir dist

      # 5. Génération de l'installateur .exe autonome avec jpackage
      - name: Génération de l'installateur Windows avec jpackage
        run: |
          jpackage `
            --type exe `
            --name "BypEdu" `
            --app-version "1.0.0" `
            --input target/ `
            --main-jar "*jar-with-dependencies.jar" `
            --main-class tg.univlome.epl.bypedu.App `
            --win-shortcut `
            --win-menu `
            --win-dir-chooser `
            --dest dist/

      # 6. Sauvegarde du fichier .exe dans les artefacts GitHub
      - name: Importer l'installateur généré dans les artefacts
        uses: actions/upload-artifact@v4
        with:
          name: BypEdu-Installer-Windows
          path: dist/*.exe
